<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rooms &amp; Suites — Grand Horizon</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-brand">
    <div class="navbar-logo">GH</div>
    <span class="navbar-name">Grand <span>Horizon</span></span>
  </a>
  <div class="navbar-nav">
    <a href="index.html" class="nav-link">Home</a>
    <a href="rooms.html" class="nav-link active">Rooms</a>
    <a href="booking.html" class="nav-link">Book Now</a>
    <a href="reservations.html" class="nav-link">My Reservations</a>
    <a href="booking.html" class="nav-link nav-btn">Reserve</a>
  </div>
</nav>

<div class="page-header">
  <div class="page-header-tag">Accommodations</div>
  <h1>Rooms &amp; <em>Suites</em></h1>
</div>

<div class="filter-bar">
  <span class="filter-label">Filter:</span>
  <button class="filter-btn active" data-filter="all">All Rooms</button>
  <button class="filter-btn" data-filter="Standard">Standard</button>
  <button class="filter-btn" data-filter="Deluxe">Deluxe</button>
  <button class="filter-btn" data-filter="Suite">Suite</button>
  <button class="filter-btn" data-filter="available">Available Only</button>
  <span class="filter-label" style="margin-left:auto;" id="roomCount"></span>
</div>

<div class="section" style="padding-top: 60px;">
  <div class="rooms-grid" id="roomsGrid"></div>
</div>

<!-- Room Detail Modal -->
<div class="modal-overlay" id="roomModal">
  <div class="modal">
    <button class="modal-close" id="modalClose">&times;</button>
    <div id="modalContent"></div>
  </div>
</div>

<footer class="footer">
  <div class="footer-bottom" style="border-top: none; padding-top: 0;">
    <span>&#169; 2024 Grand Horizon Hotel</span>
    <span style="color: var(--gold)">Hotel Management System v1.0</span>
  </div>
</footer>

<div class="toast-container" id="toastContainer"></div>
<script src="js/main.js"></script>
<script src="js/rooms.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  let currentFilter = 'all';
  const grid = document.getElementById('roomsGrid');
  const countEl = document.getElementById('roomCount');

  function applyFilter() {
    let filtered = ROOMS;
    if (currentFilter === 'available') {
      filtered = ROOMS.filter(r => r.available);
    } else if (currentFilter !== 'all') {
      filtered = ROOMS.filter(r => r.type === currentFilter);
    }
    renderRoomCards(grid, filtered, true);
    countEl.textContent = `${filtered.length} room${filtered.length !== 1 ? 's' : ''} found`;
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      applyFilter();
    });
  });

  applyFilter();

  // Modal
  const modal = document.getElementById('roomModal');
  document.getElementById('modalClose').addEventListener('click', () => modal.classList.remove('open'));
  modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });

  window.openRoomModal = (roomId) => {
    const room = ROOMS.find(r => r.id === roomId);
    if (!room) return;
    document.getElementById('modalContent').innerHTML = `
      <div class="modal-title">${room.name}</div>
      <div class="modal-subtitle" style="color: var(--gold); font-size:11px; letter-spacing:0.15em; text-transform:uppercase;">${room.type} Room &bull; Room ${room.number}</div>
      <img src="${room.image}" alt="${room.name}" style="width:100%; height:200px; object-fit:cover; margin: 20px 0;">
      <p style="font-size:13px; color: var(--gray); line-height:1.8; margin-bottom:20px;">${room.longDesc}</p>
      <div class="amenity-list" style="margin-bottom:24px;">
        ${room.amenities.map(a => `<span class="amenity-tag" style="border-color: var(--gold-pale); color: var(--navy);">${a}</span>`).join('')}
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div class="room-price">$${room.price}<span>/night</span></div>
        ${room.available
          ? `<a href="booking.html?room=${room.id}" class="btn-book" style="padding:13px 28px; font-size:11px;">Book This Room</a>`
          : `<span class="btn-book disabled" style="padding:13px 28px; font-size:11px;">Not Available</span>`}
      </div>
    `;
    modal.classList.add('open');
  };
});
</script>
</body>
</html>
